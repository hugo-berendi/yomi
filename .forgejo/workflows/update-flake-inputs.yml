name: Update Flake Inputs
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: native
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@v4
      - name: Update flake inputs
        run: nix flake update
      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run flake checks
        if: steps.check-changes.outputs.changed == 'true'
        run: just check
      - name: Commit updated flake.lock
        if: steps.check-changes.outputs.changed == 'true'
        env:
          GIT_AUTHOR_NAME: forgejo-actions
          GIT_AUTHOR_EMAIL: forgejo-actions@localhost
          GIT_COMMITTER_NAME: forgejo-actions
          GIT_COMMITTER_EMAIL: forgejo-actions@localhost
        run: |
          git add flake.lock
          git commit -m "chore: update flake lock file"
          git push
